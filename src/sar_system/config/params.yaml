# Mission
num_uavs: 3
threshold: 0.90

# Coverage area
area_bounds: [-10, 10, -10, 10]

# Occupancy grid
grid_width: 21
grid_height: 21
resolution: 1.0
origin_x: -10.0
origin_y: -10.0
collision_threshold: 0.5

# Navigation
replan_check_rate: 2.0

# Path execution
speed: 2.0
speed_x2: 0.5            # TEMP: slow x2 for ASSIST testing
waypoint_threshold: 0.2
lookahead: 8

# Detection params
confidence_threshold: 0.5
persistence_threshold: 3
detection_rate_hz: 5.0
fake_detection_probability: 0.2

# Verification params
verify_delay_min: 2.0
verify_delay_max: 5.0
verify_confirm_probability: 0.7